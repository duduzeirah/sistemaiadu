<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IADU - Organização Total</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --purple: #8b5cf6;
            --personal: #ec4899;
            --routine: #0ea5e9;
            --health: #f43f5e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* LAYOUT PADRÃO */
        header { background: white; border-bottom: 1px solid var(--border); padding: 1rem 2rem; position: sticky; top: 0; z-index: 50; }
        .header-content { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        main { max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem; }
        .back-btn { border: none; background: #f1f5f9; padding: 0.6rem 1.2rem; border-radius: 0.75rem; font-weight: 700; color: #64748b; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }

        /* TELAS DE MENU (GRID) */
        .menu-screen { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        .menu-title { font-size: 1.8rem; font-weight: 800; color: #334155; margin-bottom: 2.5rem; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; width: 100%; max-width: 900px; }
        
        .card { background: var(--card); border: 1px solid var(--border); padding: 2.5rem 1.5rem; border-radius: 1.5rem; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1); border-color: var(--primary); }
        .card i { color: #94a3b8; }
        .card span { font-size: 1.1rem; font-weight: 700; color: #475569; }

        /* ESTILOS POR CATEGORIA */
        .card-business:hover i { color: var(--primary); }
        .card-personal:hover i { color: var(--personal); }
        .card-routine:hover i { color: var(--routine); }
        .card-health:hover i { color: var(--health); }

        /* COMPONENTES DE MÓDULO */
        .module-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 2rem; }
        @media (max-width: 768px) { .module-layout { grid-template-columns: 1fr; } }
        
        .form-container { background: white; padding: 1.5rem; border-radius: 1.2rem; border: 1px solid var(--border); height: fit-content; }
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 0.4rem; color: #64748b; }
        input, select, textarea { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 0.75rem; font-size: 1rem; }
        
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 0.75rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: opacity 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-routine { background: var(--routine); color: white; }
        .btn-health { background: var(--health); color: white; }

        /* LISTAS */
        .list-container { background: white; border-radius: 1.2rem; border: 1px solid var(--border); overflow: hidden; }
        .list-item { padding: 1.2rem; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .item-data { display: flex; flex-direction: column; }
        .item-title { font-weight: 700; color: #1e293b; }
        .item-sub { font-size: 0.8rem; color: #94a3b8; }
        .done { text-decoration: line-through; opacity: 0.6; }
        
        .action-btns { display: flex; gap: 0.5rem; }
        .icon-btn { border: none; background: #f8fafc; padding: 0.5rem; border-radius: 0.5rem; cursor: pointer; color: #64748b; }
        .icon-btn:hover { background: #f1f5f9; color: var(--primary); }
        .icon-btn.delete:hover { color: var(--danger); background: #fef2f2; }
        .icon-btn.check:hover { color: var(--success); background: #f0fdf4; }

        /* STATS */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-box { background: white; padding: 1.2rem; border-radius: 1rem; border: 1px solid var(--border); text-align: center; }
        .stat-box small { color: #64748b; font-weight: 700; display: block; margin-bottom: 0.2rem; }
        .stat-box b { font-size: 1.4rem; font-weight: 900; }

        #toast { position: fixed; bottom: 2rem; right: 2rem; background: #334155; color: white; padding: 1rem 2rem; border-radius: 1rem; z-index: 1000; box-shadow: 0 10px 15px rgba(0,0,0,0.1); font-weight: 700; }
    </style>
</head>
<body>

    <div id="toast" class="hidden"></div>

    <!-- TELA 1: CATEGORIAS PRINCIPAIS -->
    <div id="screen-main" class="menu-screen fade-in">
        <h1 style="font-size: 3.5rem; font-weight: 900; color: var(--primary); margin-bottom: 1rem;">IADU</h1>
        <h2 class="menu-title">O que você quer organizar hoje?</h2>
        <div class="options-grid">
            <div class="card card-business" onclick="showScreen('category-business')">
                <i data-lucide="briefcase" size="48"></i>
                <span>Negócio</span>
            </div>
            <div class="card card-personal" onclick="showScreen('category-personal')">
                <i data-lucide="user" size="48"></i>
                <span>Pessoal</span>
            </div>
            <div class="card card-routine" onclick="showScreen('category-routine')">
                <i data-lucide="calendar" size="48"></i>
                <span>Rotina</span>
            </div>
            <div class="card card-health" onclick="showScreen('category-health')">
                <i data-lucide="heart-pulse" size="48"></i>
                <span>Saúde</span>
            </div>
        </div>
    </div>

    <!-- TELA: CATEGORIA NEGÓCIO -->
    <div id="screen-category-business" class="menu-screen hidden fade-in">
        <button class="back-btn" onclick="showScreen('main')"><i data-lucide="arrow-left"></i> Voltar</button>
        <h2 class="menu-title" style="margin-top: 2rem;">Meu Negócio</h2>
        <div class="options-grid">
            <div class="card" onclick="openModule('biz_finance')"><i data-lucide="landmark"></i><span>Finanças Biz</span></div>
            <div class="card" onclick="openModule('biz_sales')"><i data-lucide="shopping-bag"></i><span>Vendas</span></div>
            <div class="card" onclick="openModule('biz_stock')"><i data-lucide="box"></i><span>Estoque</span></div>
        </div>
    </div>

    <!-- TELA: CATEGORIA PESSOAL -->
    <div id="screen-category-personal" class="menu-screen hidden fade-in">
        <button class="back-btn" onclick="showScreen('main')"><i data-lucide="arrow-left"></i> Voltar</button>
        <h2 class="menu-title" style="margin-top: 2rem;">Vida Pessoal</h2>
        <div class="options-grid">
            <div class="card" onclick="openModule('per_finance')"><i data-lucide="wallet"></i><span>Finanças Pessoais</span></div>
        </div>
    </div>

    <!-- TELA: CATEGORIA ROTINA -->
    <div id="screen-category-routine" class="menu-screen hidden fade-in">
        <button class="back-btn" onclick="showScreen('main')"><i data-lucide="arrow-left"></i> Voltar</button>
        <h2 class="menu-title" style="margin-top: 2rem;">Rotina e Hábitos</h2>
        <div class="options-grid">
            <div class="card" onclick="openModule('rot_habits')"><i data-lucide="zap"></i><span>Hábitos</span></div>
            <div class="card" onclick="openModule('rot_tasks')"><i data-lucide="check-square"></i><span>Tarefas</span></div>
            <div class="card" onclick="openModule('rot_daily')"><i data-lucide="clock"></i><span>Rotina Diária</span></div>
        </div>
    </div>

    <!-- TELA: CATEGORIA SAÚDE -->
    <div id="screen-category-health" class="menu-screen hidden fade-in">
        <button class="back-btn" onclick="showScreen('main')"><i data-lucide="arrow-left"></i> Voltar</button>
        <h2 class="menu-title" style="margin-top: 2rem;">Saúde e Bem-estar</h2>
        <div class="options-grid">
            <div class="card" onclick="openModule('hea_diet')"><i data-lucide="utensils"></i><span>Dieta</span></div>
            <div class="card" onclick="openModule('hea_workout')"><i data-lucide="dumbbell"></i><span>Treino</span></div>
        </div>
    </div>

    <!-- MÓDULO GENÉRICO CONTAINER -->
    <div id="module-container" class="hidden">
        <header>
            <div class="header-content">
                <h2 id="module-display-name" style="font-weight: 900;">Módulo</h2>
                <button class="back-btn" id="module-back-btn"><i data-lucide="chevron-left"></i> Voltar</button>
            </div>
        </header>
        <main id="module-content" class="fade-in"></main>
    </div>

    <script>
        // --- GERENCIADOR DE ESTADO ---
        const DB = {
            get: (key) => JSON.parse(localStorage.getItem('iadu_' + key)) || [],
            set: (key, data) => localStorage.setItem('iadu_' + key, JSON.stringify(data))
        };

        const SCREENS = ['main', 'category-business', 'category-personal', 'category-routine', 'category-health'];
        let currentCategory = 'main';

        function showScreen(screenId) {
            SCREENS.forEach(s => document.getElementById('screen-' + s).classList.add('hidden'));
            document.getElementById('module-container').classList.add('hidden');
            document.getElementById('screen-' + screenId).classList.remove('hidden');
            currentCategory = screenId;
            lucide.createIcons();
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }

        // --- ROTEADOR DE MÓDULOS ---
        function openModule(modId) {
            const container = document.getElementById('module-container');
            const content = document.getElementById('module-content');
            const nameDisplay = document.getElementById('module-display-name');
            const backBtn = document.getElementById('module-back-btn');

            SCREENS.forEach(s => document.getElementById('screen-' + s).classList.add('hidden'));
            container.classList.remove('hidden');
            backBtn.onclick = () => showScreen(currentCategory);

            content.innerHTML = ''; // Limpa conteúdo anterior

            switch(modId) {
                case 'rot_habits': 
                    nameDisplay.innerText = "Hábitos Diários";
                    renderHabits(content);
                    break;
                case 'rot_tasks':
                    nameDisplay.innerText = "Lista de Tarefas";
                    renderTasks(content);
                    break;
                case 'rot_daily':
                    nameDisplay.innerText = "Minha Rotina";
                    renderDaily(content);
                    break;
                case 'hea_diet':
                    nameDisplay.innerText = "Plano Alimentar";
                    renderDiet(content);
                    break;
                case 'hea_workout':
                    nameDisplay.innerText = "Ficha de Treino";
                    renderWorkout(content);
                    break;
                case 'per_finance':
                    nameDisplay.innerText = "Finanças Pessoais";
                    renderPerFinance(content);
                    break;
                default:
                    content.innerHTML = `<div style="text-align:center; padding: 4rem;">Módulo "${modId}" em desenvolvimento.</div>`;
            }
            lucide.createIcons();
        }

        // --- MÓDULO: HÁBITOS ---
        function renderHabits(el) {
            const habits = DB.get('habits');
            el.innerHTML = `
                <div class="module-layout">
                    <div class="form-container">
                        <div class="input-group"><label>Novo Hábito</label><input type="text" id="h-name" placeholder="Ex: Ler 10 páginas"></div>
                        <button class="btn btn-routine" onclick="addHabit()">Adicionar Hábito</button>
                    </div>
                    <div class="list-container" id="h-list"></div>
                </div>`;
            
            const list = el.querySelector('#h-list');
            habits.forEach((h, idx) => {
                list.innerHTML += `
                    <div class="list-item">
                        <div class="item-data">
                            <span class="item-title ${h.doneToday ? 'done' : ''}">${h.name}</span>
                            <span class="item-sub">Fogo: ${h.streak || 0} dias</span>
                        </div>
                        <div class="action-btns">
                            <button class="icon-btn check" onclick="toggleHabit(${idx})"><i data-lucide="check"></i></button>
                            <button class="icon-btn delete" onclick="deleteItem('habits', ${idx}, renderHabits)"><i data-lucide="trash-2"></i></button>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }
        window.addHabit = () => {
            const name = document.getElementById('h-name').value;
            if(!name) return;
            const habits = DB.get('habits');
            habits.push({ name, streak: 0, doneToday: false });
            DB.set('habits', habits);
            renderHabits(document.getElementById('module-content'));
        };
        window.toggleHabit = (idx) => {
            const habits = DB.get('habits');
            habits[idx].doneToday = !habits[idx].doneToday;
            if(habits[idx].doneToday) habits[idx].streak++;
            else habits[idx].streak--;
            DB.set('habits', habits);
            renderHabits(document.getElementById('module-content'));
        };

        // --- MÓDULO: TAREFAS ---
        function renderTasks(el) {
            const tasks = DB.get('tasks');
            el.innerHTML = `
                <div class="module-layout">
                    <div class="form-container">
                        <div class="input-group"><label>O que precisa ser feito?</label><input type="text" id="t-name"></div>
                        <button class="btn btn-routine" onclick="addTask()">Salvar Tarefa</button>
                    </div>
                    <div class="list-container" id="t-list"></div>
                </div>`;
            const list = el.querySelector('#t-list');
            tasks.forEach((t, idx) => {
                list.innerHTML += `
                    <div class="list-item">
                        <span class="item-title ${t.done ? 'done' : ''}">${t.name}</span>
                        <div class="action-btns">
                            <button class="icon-btn check" onclick="toggleTask(${idx})"><i data-lucide="${t.done ? 'rotate-ccw' : 'check'}"></i></button>
                            <button class="icon-btn delete" onclick="deleteItem('tasks', ${idx}, renderTasks)"><i data-lucide="trash-2"></i></button>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }
        window.addTask = () => {
            const name = document.getElementById('t-name').value;
            if(!name) return;
            const tasks = DB.get('tasks');
            tasks.push({ name, done: false });
            DB.set('tasks', tasks);
            renderTasks(document.getElementById('module-content'));
        };
        window.toggleTask = (idx) => {
            const tasks = DB.get('tasks');
            tasks[idx].done = !tasks[idx].done;
            DB.set('tasks', tasks);
            renderTasks(document.getElementById('module-content'));
        };

        // --- MÓDULO: ROTINA DIÁRIA ---
        function renderDaily(el) {
            const routines = DB.get('daily_rot');
            el.innerHTML = `
                <div class="module-layout">
                    <div class="form-container">
                        <div class="input-group"><label>Horário</label><input type="time" id="r-time"></div>
                        <div class="input-group"><label>Atividade</label><input type="text" id="r-act"></div>
                        <button class="btn btn-routine" onclick="addDaily()">Fixar na Rotina</button>
                    </div>
                    <div class="list-container" id="r-list"></div>
                </div>`;
            const list = el.querySelector('#r-list');
            routines.sort((a,b) => a.time.localeCompare(b.time)).forEach((r, idx) => {
                list.innerHTML += `
                    <div class="list-item">
                        <div class="item-data">
                            <span class="item-title ${r.done ? 'done' : ''}">${r.time} - ${r.act}</span>
                        </div>
                        <div class="action-btns">
                            <button class="icon-btn check" onclick="toggleDaily(${idx})"><i data-lucide="check-circle"></i></button>
                            <button class="icon-btn delete" onclick="deleteItem('daily_rot', ${idx}, renderDaily)"><i data-lucide="trash-2"></i></button>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }
        window.addDaily = () => {
            const time = document.getElementById('r-time').value;
            const act = document.getElementById('r-act').value;
            if(!act) return;
            const rot = DB.get('daily_rot');
            rot.push({ time, act, done: false });
            DB.set('daily_rot', rot);
            renderDaily(document.getElementById('module-content'));
        };
        window.toggleDaily = (idx) => {
            const rot = DB.get('daily_rot');
            rot[idx].done = !rot[idx].done;
            DB.set('daily_rot', rot);
            renderDaily(document.getElementById('module-content'));
        };

        // --- MÓDULO: DIETA ---
        function renderDiet(el) {
            const diet = DB.get('diet');
            el.innerHTML = `
                <div class="module-layout">
                    <div class="form-container">
                        <div class="input-group"><label>Refeição</label><input type="text" id="d-name" placeholder="Café da manhã"></div>
                        <div class="input-group"><label>O que comer</label><textarea id="d-desc" rows="3"></textarea></div>
                        <button class="btn btn-health" onclick="addDiet()">Salvar Cardápio</button>
                    </div>
                    <div class="list-container" id="d-list"></div>
                </div>`;
            const list = el.querySelector('#d-list');
            diet.forEach((d, idx) => {
                list.innerHTML += `
                    <div class="list-item">
                        <div class="item-data">
                            <span class="item-title">${d.name}</span>
                            <span class="item-sub">${d.desc}</span>
                        </div>
                        <button class="icon-btn delete" onclick="deleteItem('diet', ${idx}, renderDiet)"><i data-lucide="trash-2"></i></button>
                    </div>`;
            });
            lucide.createIcons();
        }
        window.addDiet = () => {
            const name = document.getElementById('d-name').value;
            const desc = document.getElementById('d-desc').value;
            if(!name) return;
            const d = DB.get('diet');
            d.push({ name, desc });
            DB.set('diet', d);
            renderDiet(document.getElementById('module-content'));
        };

        // --- MÓDULO: TREINO ---
        function renderWorkout(el) {
            const workouts = DB.get('workouts');
            el.innerHTML = `
                <div class="module-layout">
                    <div class="form-container">
                        <div class="input-group"><label>Exercício</label><input type="text" id="w-name"></div>
                        <div class="input-group"><label>Séries/Repetições</label><input type="text" id="w-reps" placeholder="3x12"></div>
                        <button class="btn btn-health" onclick="addWorkout()">Adicionar Exercício</button>
                    </div>
                    <div class="list-container" id="w-list"></div>
                </div>`;
            const list = el.querySelector('#w-list');
            workouts.forEach((w, idx) => {
                list.innerHTML += `
                    <div class="list-item">
                        <div class="item-data">
                            <span class="item-title ${w.done ? 'done' : ''}">${w.name}</span>
                            <span class="item-sub">${w.reps}</span>
                        </div>
                        <div class="action-btns">
                            <button class="icon-btn check" onclick="toggleWorkout(${idx})"><i data-lucide="circle"></i></button>
                            <button class="icon-btn delete" onclick="deleteItem('workouts', ${idx}, renderWorkout)"><i data-lucide="trash-2"></i></button>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }
        window.addWorkout = () => {
            const name = document.getElementById('w-name').value;
            const reps = document.getElementById('w-reps').value;
            if(!name) return;
            const w = DB.get('workouts');
            w.push({ name, reps, done: false });
            DB.set('workouts', w);
            renderWorkout(document.getElementById('module-content'));
        };
        window.toggleWorkout = (idx) => {
            const w = DB.get('workouts');
            w[idx].done = !w[idx].done;
            DB.set('workouts', w);
            renderWorkout(document.getElementById('module-content'));
        };

        // --- MÓDULO: FINANÇAS PESSOAIS ---
        function renderPerFinance(el) {
            const data = DB.get('per_fin');
            const total = data.reduce((acc, curr) => curr.type === 'in' ? acc + curr.val : acc - curr.val, 0);
            el.innerHTML = `
                <div class="stats-row">
                    <div class="stat-box"><small>Saldo Atual</small><b>R$ ${total.toFixed(2)}</b></div>
                </div>
                <div class="module-layout">
                    <div class="form-container">
                        <div class="input-group"><label>Tipo</label><select id="f-type"><option value="in">Entrada</option><option value="out">Saída</option></select></div>
                        <div class="input-group"><label>Valor (R$)</label><input type="number" id="f-val"></div>
                        <div class="input-group"><label>Descrição</label><input type="text" id="f-desc"></div>
                        <button class="btn btn-primary" style="background:var(--personal)" onclick="addPerFin()">Lançar</button>
                    </div>
                    <div class="list-container" id="f-list"></div>
                </div>`;
            const list = el.querySelector('#f-list');
            data.reverse().forEach((f, idx) => {
                list.innerHTML += `
                    <div class="list-item">
                        <div class="item-data">
                            <span class="item-title">${f.desc}</span>
                            <span class="item-sub">${new Date().toLocaleDateString()}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span style="font-weight:900; color: ${f.type === 'in' ? 'var(--success)' : 'var(--danger)'}">
                                ${f.type === 'in' ? '+' : '-'} R$ ${f.val.toFixed(2)}
                            </span>
                            <button class="icon-btn delete" onclick="deleteItem('per_fin', ${data.length-1-idx}, renderPerFinance)"><i data-lucide="trash-2"></i></button>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }
        window.addPerFin = () => {
            const val = parseFloat(document.getElementById('f-val').value);
            const desc = document.getElementById('f-desc').value;
            const type = document.getElementById('f-type').value;
            if(isNaN(val) || !desc) return;
            const f = DB.get('per_fin');
            f.push({ val, desc, type });
            DB.set('per_fin', f);
            renderPerFinance(document.getElementById('module-content'));
        };

        // --- UTILITÁRIO DE EXCLUSÃO ---
        window.deleteItem = (key, idx, callback) => {
            const data = DB.get(key);
            data.splice(idx, 1);
            DB.set(key, data);
            callback(document.getElementById('module-content'));
            notify("Item removido!");
        };

        // Início
        window.onload = () => {
            lucide.createIcons();
        };
    </script>
</body>
</html>
