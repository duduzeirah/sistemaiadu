<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IADU - Gestão Total</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --personal: #ec4899;
            --routine: #0ea5e9;
            --health: #f43f5e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); }
        .hidden { display: none !important; }
        
        header { background: white; border-bottom: 1px solid var(--border); padding: 1rem 2rem; position: sticky; top: 0; z-index: 50; display: flex; justify-content: space-between; align-items: center; }
        main { max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem; }

        /* Dashboard */
        .menu-screen { text-align: center; padding: 2rem 0; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .card { background: white; border: 1px solid var(--border); padding: 2rem; border-radius: 1rem; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

        /* Módulos */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid var(--border); text-align: center; }
        .stat-card b { display: block; font-size: 1.25rem; margin-top: 0.5rem; }

        .module-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 2rem; }
        @media (max-width: 768px) { .module-grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: 1fr; } }

        .form-box { background: white; padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--border); height: fit-content; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.3rem; color: #64748b; }
        input, select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; }

        .btn { width: 100%; padding: 0.8rem; border: none; border-radius: 0.5rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 0.5rem; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-pdf { background: #334155; color: white; margin-top: 1rem; }
        .btn-back { background: #f1f5f9; color: #64748b; width: auto; padding: 0.5rem 1rem; }

        .data-list { background: white; border-radius: 1rem; border: 1px solid var(--border); overflow: hidden; }
        .item { padding: 1rem; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .item:last-child { border: none; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:1rem">
            <button id="btn-back-main" class="btn btn-back hidden" onclick="showScreen('main')"><i data-lucide="arrow-left"></i></button>
            <h1 id="app-title" style="font-size: 1.5rem; color: var(--primary)">IADU</h1>
        </div>
        <div id="header-actions"></div>
    </header>

    <main>
        <!-- Home -->
        <div id="screen-main" class="menu-screen">
            <h2>Bem-vindo ao seu Organizador</h2>
            <div class="options-grid">
                <div class="card" onclick="showScreen('biz')"><i data-lucide="briefcase" color="var(--primary)"></i><span>Negócio</span></div>
                <div class="card" onclick="showScreen('per')"><i data-lucide="user" color="var(--personal)"></i><span>Pessoal</span></div>
                <div class="card" onclick="showScreen('rou')"><i data-lucide="calendar" color="var(--routine)"></i><span>Rotina</span></div>
                <div class="card" onclick="showScreen('hea')"><i data-lucide="heart" color="var(--health)"></i><span>Saúde</span></div>
            </div>
        </div>

        <!-- Submenus -->
        <div id="screen-biz" class="menu-screen hidden">
            <div class="options-grid">
                <div class="card" onclick="openModule('biz_finance')"><i data-lucide="landmark"></i><span>Finanças Biz</span></div>
                <div class="card" onclick="openModule('biz_sales')"><i data-lucide="shopping-cart"></i><span>Vendas</span></div>
                <div class="card" onclick="openModule('biz_stock')"><i data-lucide="package"></i><span>Estoque</span></div>
            </div>
        </div>

        <div id="screen-per" class="menu-screen hidden">
            <div class="options-grid">
                <div class="card" onclick="openModule('per_finance')"><i data-lucide="wallet"></i><span>Finanças Pessoal</span></div>
            </div>
        </div>

        <div id="screen-rou" class="menu-screen hidden">
            <div class="options-grid">
                <div class="card" onclick="openModule('rou_tasks')"><i data-lucide="list-checks"></i><span>Tarefas</span></div>
                <div class="card" onclick="openModule('rou_habits')"><i data-lucide="zap"></i><span>Hábitos</span></div>
            </div>
        </div>

        <div id="screen-hea" class="menu-screen hidden">
            <div class="options-grid">
                <div class="card" onclick="openModule('hea_diet')"><i data-lucide="utensils"></i><span>Dieta</span></div>
                <div class="card" onclick="openModule('hea_workout')"><i data-lucide="dumbbell"></i><span>Treino</span></div>
            </div>
        </div>

        <!-- Module Container -->
        <div id="module-view" class="hidden">
            <div id="module-stats" class="stats-grid"></div>
            <div class="module-grid">
                <div id="module-form" class="form-box"></div>
                <div id="module-list" class="data-list"></div>
            </div>
            <button class="btn btn-pdf" onclick="generatePDF()"><i data-lucide="file-text"></i> Exportar PDF</button>
        </div>
    </main>

    <script>
        const DB = {
            get: (key) => JSON.parse(localStorage.getItem('iadu_' + key)) || [],
            save: (key, data) => localStorage.setItem('iadu_' + key, JSON.stringify(data))
        };

        let currentModule = '';

        function showScreen(id) {
            document.querySelectorAll('.menu-screen, #module-view').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-' + id)?.classList.remove('hidden');
            document.getElementById('btn-back-main').classList.toggle('hidden', id === 'main');
            document.getElementById('app-title').innerText = id === 'main' ? 'IADU' : id.toUpperCase();
            lucide.createIcons();
        }

        function openModule(mod) {
            currentModule = mod;
            document.querySelectorAll('.menu-screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('module-view').classList.remove('hidden');
            renderModule();
        }

        function renderModule() {
            const form = document.getElementById('module-form');
            const list = document.getElementById('module-list');
            const stats = document.getElementById('module-stats');
            const data = DB.get(currentModule);

            stats.innerHTML = '';
            
            if (currentModule === 'biz_finance') {
                const ins = data.filter(i => i.type === 'in').reduce((a, b) => a + Number(b.val), 0);
                const outs = data.filter(i => i.type === 'out').reduce((a, b) => a + Number(b.val), 0);
                stats.innerHTML = `
                    <div class="stat-card">Entradas <b style="color:var(--success)">R$ ${ins.toFixed(2)}</b></div>
                    <div class="stat-card">Saídas <b style="color:var(--danger)">R$ ${outs.toFixed(2)}</b></div>
                    <div class="stat-card">Saldo <b>R$ ${(ins - outs).toFixed(2)}</b></div>
                `;
                form.innerHTML = `
                    <div class="input-group"><label>Descrição</label><input type="text" id="f-desc"></div>
                    <div class="input-group"><label>Valor</label><input type="number" id="f-val"></div>
                    <div class="input-group"><label>Tipo</label><select id="f-type"><option value="in">Entrada</option><option value="out">Saída</option></select></div>
                    <button class="btn btn-blue" onclick="addData()">Salvar</button>
                `;
            } else if (currentModule === 'biz_sales') {
                const stock = DB.get('biz_stock');
                form.innerHTML = `
                    <div class="input-group"><label>Produto</label>
                    <select id="s-prod">${stock.map((p, i) => `<option value="${i}">${p.name} (R$ ${p.price})</option>`)}</select></div>
                    <div class="input-group"><label>Quantidade</label><input type="number" id="s-qty" value="1"></div>
                    <button class="btn btn-blue" onclick="addSale()">Vender</button>
                `;
            } else if (currentModule === 'biz_stock') {
                form.innerHTML = `
                    <div class="input-group"><label>Produto</label><input type="text" id="st-name"></div>
                    <div class="input-group"><label>Preço Unitário</label><input type="number" id="st-price"></div>
                    <div class="input-group"><label>Qtd Inicial</label><input type="number" id="st-qty"></div>
                    <button class="btn btn-blue" onclick="addData()">Adicionar</button>
                `;
            } else if (currentModule === 'rou_tasks') {
                form.innerHTML = `
                    <div class="input-group"><label>Tarefa</label><input type="text" id="t-name"></div>
                    <div class="input-group"><label>Prioridade</label><select id="t-pri"><option>Baixa</option><option>Alta</option></select></div>
                    <button class="btn btn-blue" onclick="addData()">Adicionar</button>
                `;
            } else if (currentModule === 'hea_workout') {
                form.innerHTML = `
                    <div class="input-group"><label>Exercício</label><input type="text" id="w-name"></div>
                    <div class="input-group"><label>Séries x Reps</label><input type="text" id="w-reps"></div>
                    <button class="btn btn-blue" onclick="addData()">Salvar Treino</button>
                `;
            } else {
                // Fallback para outros módulos similares
                form.innerHTML = `
                    <div class="input-group"><label>Nome/Descrição</label><input type="text" id="gen-name"></div>
                    <div class="input-group"><label>Valor/Info</label><input type="text" id="gen-info"></div>
                    <button class="btn btn-blue" onclick="addData()">Salvar</button>
                `;
            }

            list.innerHTML = data.length ? '' : '<p style="padding:2rem; color:#94a3b8; text-align:center">Nenhum registro.</p>';
            data.slice().reverse().forEach((item, idx) => {
                list.innerHTML += `
                    <div class="item">
                        <div>
                            <strong>${item.name || item.desc || 'Registro'}</strong>
                            <div style="font-size:0.8rem; color:#64748b">${item.val ? 'R$ '+item.val : (item.info || item.qty || '')}</div>
                        </div>
                        <button onclick="deleteData(${data.length - 1 - idx})" style="border:none; background:none; cursor:pointer; color:var(--danger)"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function addData() {
            const data = DB.get(currentModule);
            let newItem = { id: Date.now(), date: new Date().toLocaleDateString() };

            if (currentModule === 'biz_finance') {
                newItem.desc = document.getElementById('f-desc').value;
                newItem.val = document.getElementById('f-val').value;
                newItem.type = document.getElementById('f-type').value;
            } else if (currentModule === 'biz_stock') {
                newItem.name = document.getElementById('st-name').value;
                newItem.price = document.getElementById('st-price').value;
                newItem.qty = document.getElementById('st-qty').value;
            } else if (currentModule === 'rou_tasks') {
                newItem.name = document.getElementById('t-name').value;
                newItem.info = document.getElementById('t-pri').value;
            } else if (currentModule === 'hea_workout') {
                newItem.name = document.getElementById('w-name').value;
                newItem.info = document.getElementById('w-reps').value;
            } else {
                newItem.name = document.getElementById('gen-name').value;
                newItem.info = document.getElementById('gen-info').value;
            }

            data.push(newItem);
            DB.save(currentModule, data);
            renderModule();
        }

        function addSale() {
            const stock = DB.get('biz_stock');
            const sales = DB.get('biz_sales');
            const bizFin = DB.get('biz_finance');
            const idx = document.getElementById('s-prod').value;
            const qty = Number(document.getElementById('s-qty').value);

            if (stock[idx] && stock[idx].qty >= qty) {
                const total = stock[idx].price * qty;
                stock[idx].qty -= qty;
                sales.push({ name: `Venda: ${stock[idx].name}`, qty, val: total });
                bizFin.push({ desc: `Venda: ${stock[idx].name}`, val: total, type: 'in' });
                
                DB.save('biz_stock', stock);
                DB.save('biz_sales', sales);
                DB.save('biz_finance', bizFin);
                renderModule();
            } else {
                alert('Estoque insuficiente!');
            }
        }

        function deleteData(idx) {
            const data = DB.get(currentModule);
            data.splice(idx, 1);
            DB.save(currentModule, data);
            renderModule();
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const data = DB.get(currentModule);
            
            doc.setFontSize(20);
            doc.text(`Relatorio IADU: ${currentModule.toUpperCase()}`, 10, 20);
            
            doc.setFontSize(12);
            let y = 40;
            data.forEach((item, i) => {
                const line = `${i+1}. ${item.name || item.desc} - ${item.val || item.info || item.qty || ''}`;
                doc.text(line, 10, y);
                y += 10;
                if(y > 280) { doc.addPage(); y = 20; }
            });
            
            doc.save(`relatorio_${currentModule}.pdf`);
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
